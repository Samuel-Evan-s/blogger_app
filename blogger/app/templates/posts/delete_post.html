{% extends 'base.html' %}


{% block content %}
<div class="border round">
    <h1 class="my-5">Delete Post</h1>
    <p>Are you sure you want to delete the post "{{ Post.title }}"?</p>
    <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Yes, Delete</button>
        <a href="{% url 'posts.details' Post.pk %}" class="btn btn-secondary">Cancel</a>
    </form>
</div>
{% endblock %}
