{% load static %}

<html>
    <head>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
        <title>My Blog</title>
    </head>
    <body>
        <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
            <div class="ms-auto">
                {% if user.is_authenticated %}
                    <span class="navbar-text me-2">Welcome, {{ user.username }}!</span>
                    <a href="{% url 'home' %}" class="btn btn-outline-light me-1">Home</a>
                    <a href="{% url 'posts.new' %}" class="btn btn-outline-light me-1">Create New Post</a>
                    <form method="post" action="{% url 'home.logout' %}" class="d-inline">
                        {% csrf_token %}
                        <button type="submit" class="btn btn-outline-light">Logout</button>
                    </form>
                    
                {% else %}
                    <a href="{% url 'home.login' %}" class="btn btn-outline-light me-1">Login</a>
                    <a href="{% url 'home.signup' %}" class="btn btn-outline-light me-1">Sign Up</a>
                {% endif %}
            </div>
        </nav>
        <div class="my-5 text-center container">
            {% block content %}
            {% endblock %}
        </div>
    </body>
</html>
